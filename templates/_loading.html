<!-- LOADING OVERLAY — Premium transparent transition -->
<div id="loadingOverlay" class="loading-overlay" style="display:none;">
    <div class="loading-content">
        <video id="loadingVideo" class="loading-video" autoplay muted playsinline loop>
            <source src="/static/transition.mp4" type="video/mp4">
        </video>
        <div class="loading-progress">
            <div class="loading-bar"></div>
        </div>
    </div>
</div>

<style>
    .loading-overlay {
        position: fixed;
        top: 0; left: 0;
        width: 100vw; height: 100vh;
        z-index: 99999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: transparent;
        opacity: 0;
        transition: opacity 0.25s ease;
    }
    .loading-overlay.active {
        opacity: 1;
    }

    .loading-content {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        animation: contentFadeIn 0.4s ease forwards;
    }

    @keyframes contentFadeIn {
        0%   { opacity: 0; transform: scale(0.85); }
        100% { opacity: 1; transform: scale(1); }
    }

    .loading-video {
        width: 320px;
        height: 320px;
        object-fit: contain;
        border-radius: 24px;
        filter: drop-shadow(0 0 40px rgba(76, 217, 100, 0.35))
               drop-shadow(0 0 80px rgba(76, 217, 100, 0.15));
        animation: logoPulse 2s ease-in-out infinite;
    }

    @keyframes logoPulse {
        0%, 100% { 
            filter: drop-shadow(0 0 40px rgba(76, 217, 100, 0.35))
                    drop-shadow(0 0 80px rgba(76, 217, 100, 0.15));
            transform: scale(1);
        }
        50% { 
            filter: drop-shadow(0 0 50px rgba(76, 217, 100, 0.5))
                    drop-shadow(0 0 100px rgba(76, 217, 100, 0.25));
            transform: scale(1.03);
        }
    }

    .loading-progress {
        width: 200px;
        height: 3px;
        background: rgba(255, 255, 255, 0.15);
        border-radius: 3px;
        overflow: hidden;
        margin-top: 20px;
    }

    .loading-bar {
        width: 0%;
        height: 100%;
        background: linear-gradient(90deg, #4cd964, #34c759, #30d158);
        border-radius: 3px;
        animation: loadProgress 3s ease-in-out forwards;
        box-shadow: 0 0 10px rgba(76, 217, 100, 0.6);
    }

    @keyframes loadProgress {
        0%   { width: 0%; }
        15%  { width: 25%; }
        40%  { width: 45%; }
        60%  { width: 65%; }
        80%  { width: 80%; }
        95%  { width: 90%; }
        100% { width: 95%; }
    }
</style>

<script>
(function() {
    function showLoading() {
        const overlay = document.getElementById('loadingOverlay');
        const video = document.getElementById('loadingVideo');
        const bar = overlay.querySelector('.loading-bar');

        // Reset progress bar animation
        bar.style.animation = 'none';
        bar.offsetHeight;
        bar.style.animation = 'loadProgress 3s ease-in-out forwards';

        overlay.style.display = 'flex';
        overlay.offsetHeight;
        overlay.classList.add('active');

        if (video) {
            video.currentTime = 0;
            video.play().catch(() => {});
        }
    }

    // Block forms on submit
    document.addEventListener('submit', function(e) {
        var form = e.target;
        if (form.getAttribute('data-no-loading') === 'true') return;

        showLoading();

        // Disable ALL buttons to prevent double-submit
        form.querySelectorAll('button, input[type="submit"]').forEach(function(btn) {
            btn.disabled = true;
            btn.style.opacity = '0.5';
            btn.style.pointerEvents = 'none';
        });
    });

    // Block navigation buttons
    document.addEventListener('click', function(e) {
        var btn = e.target.closest('button[onclick], a.btn');
        if (!btn) return;
        if (btn.closest('form') && btn.type === 'submit') return;
        if (btn.getAttribute('data-no-loading') === 'true') return;

        var onclick = btn.getAttribute('onclick') || '';
        var href = btn.getAttribute('href') || '';
        if (onclick.includes('location') || onclick.includes('presupuesto') ||
            (href && href !== '#' && href !== 'javascript:void(0)')) {
            showLoading();
        }
    });

    // Hide on back button
    window.addEventListener('pageshow', function(e) {
        if (e.persisted) {
            var overlay = document.getElementById('loadingOverlay');
            overlay.classList.remove('active');
            overlay.style.display = 'none';
            document.querySelectorAll('button, input[type="submit"]').forEach(function(btn) {
                btn.disabled = false;
                btn.style.opacity = '';
                btn.style.pointerEvents = '';
            });
        }
    });
})();
</script>
